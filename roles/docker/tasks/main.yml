---
# 🔹 Cleanup old Docker repo issues (IMPORTANT)
- name: Remove old Docker repo
  file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent
  tags: docker

- name: Remove old Docker key files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/keyrings/docker.asc
    - /etc/apt/keyrings/docker.gpg
  tags: docker

# 🔹 Install required dependencies
- name: Install required system packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-pip
    state: present
    update_cache: true
  tags: docker

# 🔹 Setup Docker GPG key (modern method)
- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  tags: docker

- name: Add Docker GPG key (dearmor)
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  tags: docker

- name: Set permissions for Docker GPG key
  file:
    path: /etc/apt/keyrings/docker.gpg
    mode: '0644'
  tags: docker

# 🔹 Add Docker repository
- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
    filename: docker
  tags: docker

# 🔹 Install Docker
- name: Install Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
    update_cache: true
  tags: docker

# 🔹 Start Docker service
- name: Start and enable Docker
  service:
    name: docker
    state: started
    enabled: true
  tags: docker

# 🔹 Add deploy user to Docker group
- name: Add deploy user to docker group
  user:
    name: deploy
    groups: docker
    append: yes
  tags: docker

- name: Install Docker SDK for Python via apt
  apt:
    name: python3-docker
    state: present
    update_cache: true
  tags: docker

# 🔹 Login to Docker Hub (Vault-secured)
- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ vault_docker_username }}"
    password: "{{ vault_docker_password }}"
  when: vault_docker_username is defined
  tags: docker

# 🔹 Pull application image
- name: Pull application image
  community.docker.docker_image:
    name: "{{ docker_app_image }}"
    tag: "{{ docker_app_tag }}"
    source: pull
  tags: docker

# 🔹 Run container
- name: Run application container
  community.docker.docker_container:
    name: "{{ docker_app_name }}"
    image: "{{ docker_app_image }}:{{ docker_app_tag }}"
    state: started
    restart_policy: always
    ports:
      - "{{ docker_app_port }}:{{ docker_container_port }}"
  tags: docker

# 🔹 Health check
- name: Wait for container to be healthy
  uri:
    url: "http://localhost:{{ docker_app_port }}"
    status_code: 200
  register: health_check
  retries: 5
  delay: 3
  until: health_check.status == 200
  tags: docker

