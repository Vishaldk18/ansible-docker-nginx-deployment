---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: true
  tags: nginx

- name: Remove default config
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  tags: nginx

- name: Deploy nginx.conf
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify: Reload Nginx
  tags: nginx

- name: Deploy reverse proxy config
  template:
    src: app-proxy.conf.j2
    dest: /etc/nginx/conf.d/app.conf
  notify: Reload Nginx
  tags: nginx

- name: Test Nginx configuration
  command: nginx -t
  changed_when: false
  tags: nginx

- name: Start and enable Nginx
  service:
    name: nginx
    state: started
    enabled: true
  tags: nginx
